{% extends "frontend/base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'frontend/dashboard.css' %}">
<link rel="stylesheet" href="{% static 'frontend/certification-models.css' %}">

<div class="dashboard-page">
    <aside class="dashboard-sidebar">
        <div class="sidebar-brand">
            <img src="{% static 'frontend/svgs/certificate.svg'%}" width="32" height="32">
            <div class="brand-text">
                <div class="brand-title">CertiPro</div>
                <div class="brand-subtitle">Gestión de Certificaciones</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="{% url 'dashboard' %}" class="sidebar-link">
                <span>
                    <img src="{% static 'frontend/svgs/dashboard.svg' %}" width="22" height="22">
                </span>
                <span>Panel Principal</span>
            </a>
            <a href="#" class="sidebar-link active" onclick="event.preventDefault();">
                <span>
                    <img src="{% static 'frontend/svgs/medal-star.svg' %}" width="22" height="22">
                </span>
                <span>Modelos de Certificación</span>
            </a>
            <a href="{% url 'organizational_structure' %}" class="sidebar-link">
                <span>
                    <img src="{% static 'frontend/svgs/group.svg' %}" width="22" height="22">
                </span>
                <span>Estructura Organizacional</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-panel">
                <div id="sidebar-user-avatar" class="user-avatar"></div>
                <div class="user-info">
                    <div id="sidebar-user-name" class="user-name"></div>
                    <div id="sidebar-user-role" class="user-role"></div>
                </div>
            </div>
            <a href="#" id="log-out" class="sign-out">Cerrar Sesión</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <div class="search-box">
                <span>
                    <img src="{% static 'frontend/svgs/search.svg' %}" width="22" height="22">
                </span>
                <input type="text" placeholder="Buscar criterios, tareas..." />
            </div>
            <div class="header-user">
                <div id="header-user-name" class="header-user-name"></div>
                <div id="header-user-role" class="header-user-role"></div>
            </div>
        </header>

        <section class="dashboard-content">
            <div id="models-list-view" class="models-list-view">
                <div class="certification-header">
                    <div>
                        <h2 id="certification-header-title">Modelos de Certificación</h2>
                        <p id="certification-header-subtitle">Gestiona los modelos de certificación y su estructura.</p>
                    </div>
                    <button id="nuevo_modelo">
                        <img src="{% static 'frontend/svgs/plus.svg' %}" width="22" height="22">
                        Nuevo Modelo
                    </button>
                </div>

                <!-- Grid de cards: se puebla dinámicamente via JS -->
                <div id="models-grid" class="models-grid"></div>
            </div>
        </section>
    </main>
</div>

<script>
    const API_URL = "{{ api_url }}";

    // ── Helpers de fecha ────────────────────────────────────────────────────
    function formatDate(dateStr) {
        if (!dateStr) return '—';
        const [year, month] = dateStr.split('-');
        const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        return `${months[parseInt(month, 10) - 1]} ${year}`;
    }

    // ── Renderizar cards ────────────────────────────────────────────────────
    function renderModels(models) {
        const grid = document.getElementById('models-grid');
        grid.innerHTML = '';

        if (!models || models.length === 0) {
            grid.innerHTML = '<div class="models-empty">No hay modelos de certificación registrados aún.</div>';
            return;
        }

        models.forEach(model => {
            const card = document.createElement('div');
            card.className = 'model-card';
            card.dataset.id = model.id;

            // Badge de estado: por ahora simplemente "Activo" si end_date >= hoy, sino "Culminado"
            const today = new Date().toISOString().split('T')[0];
            const statusLabel = model.end_date && model.end_date < today ? 'Culminado' : 'Activo';

            const criteriaCount = model.criteria_count ?? '—';

            card.innerHTML = `
                <div class="model-card-top">
                    <div class="model-card-info">
                        <span class="model-card-badge">${statusLabel}</span>
                        <h3 class="model-card-title">${model.title}</h3>
                        <div class="model-card-accreditor">
                            <img src="{% static 'frontend/svgs/medal-star.svg' %}" width="13" height="13">
                            ${model.accreditor ?? '—'}
                        </div>
                    </div>
                    <span class="model-card-arrow">›</span>
                </div>
                <hr class="model-card-divider">
                <div class="model-card-bottom">
                    <div class="model-card-dates">
                        <img src="{% static 'frontend/svgs/dashboard.svg' %}" width="13" height="13">
                        ${formatDate(model.start_date)} - ${formatDate(model.end_date)}
                    </div>
                    <span class="model-card-criteria">${criteriaCount} criterios</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // ── Cargar modelos desde la API ─────────────────────────────────────────
    async function loadModels(accessToken) {
        const grid = document.getElementById('models-grid');
        grid.innerHTML = '<div class="models-empty">Cargando modelos...</div>';

        try {
            const data = await API_UTILS.get("/certification_models/")

            if (!data) throw new Error(`Error ${data.status}`);

            // La API puede devolver lista directa o { results: [...] } si usa paginación
            const models = Array.isArray(data) ? data : (data.results ?? []);

            renderModels(models);

            let cards = document.querySelectorAll('.model-card');
            for (let card of cards) {
                card.addEventListener('click', () => {
                    localStorage.setItem('selected_model_id', card.dataset.id);
                    window.location.href = "{% url 'model_view' %}";
                });
            }
        } catch (err) {
            console.error('Error cargando modelos:', err);
            grid.innerHTML = '<div class="models-empty">Error al cargar los modelos. Intente de nuevo.</div>';
        }
    }

    // ── Init ────────────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", async () => {
        // Botón nuevo modelo
        document.getElementById("nuevo_modelo").addEventListener("click", () => {
            window.location.href = "{% url 'new_certification_model' %}";
        });

        // Auth
        const accessToken = localStorage.getItem('access_token');
        const userMetadataStr = localStorage.getItem('user_metadata');

        if (!accessToken || !userMetadataStr) {
            localStorage.clear();
            window.location.href = "{% url 'select_profile' %}";
            return;
        }

        const user = JSON.parse(userMetadataStr);

        // Avatar con iniciales
        const names = user.full_name.trim().split(" ");
        const initials = names.length > 1
            ? (names[0][0] + names[names.length - 1][0]).toUpperCase()
            : names[0][0].toUpperCase();

        document.getElementById('sidebar-user-avatar').innerText = initials;
        document.getElementById('sidebar-user-name').innerText = user.full_name;
        document.getElementById('sidebar-user-role').innerText = user.role;

        document.getElementById('header-user-name').innerText = user.full_name;
        document.getElementById('header-user-role').innerText = user.role;

        document.getElementById('log-out').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = "{% url 'select_profile' %}";
        });

        // Cargar modelos
        await loadModels(accessToken);
    });
</script>


{% endblock %}

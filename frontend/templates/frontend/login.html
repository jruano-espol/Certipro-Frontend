{% extends "frontend/base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'frontend/login.css' %}">
<a class="back" href="{% url 'select_profile' %}" aria-label="Volver">
  <!-- left arrow icon -->
  <svg viewBox="0 0 20 20" fill="none" width="18" height="18" aria-hidden="true">
    <path d="M11 15L6 10l5-5" stroke="#3b4854" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Cambiar perfil
</a>

<div class="login">
    <div class="title">
      <h1 id="login-heading">Iniciar Sesión</h1>
      <div class="subtitle">Accediendo como <b>{{role}}</b></div>
    </div>

    <form action="{% url 'dashboard' %}" method="get">
      <div class="field">
        <label for="email">Correo Electrónico</label>
        <div class="input" aria-hidden="false">
          <!-- mail icon -->
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 7.5v9A2.5 2.5 0 0 0 5.5 19h13a2.5 2.5 0 0 0 2.5-2.5v-9" stroke="#9aa3ad" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 7.5 12 13 3 7.5" stroke="#9aa3ad" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input id="email" type="email" placeholder="tu@correo.com" value="" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input">
          <!-- lock icon -->
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3.5" y="10.5" width="17" height="10" rx="2" ry="2" stroke="#9aa3ad" stroke-width="1.4" />
            <path d="M7 10.5V8a5 5 0 0 1 10 0v2.5" stroke="#9aa3ad" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </div>

      <div class="row" style="margin-top:6px;">
        <label class="checkbox"><input type="checkbox" /> Recordarme</label>
        <a class="forgot" href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn">Iniciar Sesión</button>
    </form>
</div>
<footer class="dim-text">
    <small>CertiPro © 2026 - Proyecto Académico</small>
</footer>
{% endblock %}
